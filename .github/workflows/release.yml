name: Create Release

on:
  push:
    branches:
      - main
    tags-ignore:        
      - 'main'
    paths:
      - .github/workflows/release.yml
      - tools/get-snp-report/**
      - tools/importkey/**
      - pkg/common/akv.go
      - pkg/common/keyblob.go
      
env:
  GO_VERSION: "1.22.x"

jobs:
  build:
    name: Build Binaries
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Build Linux Executables
        run: |
          pushd tools/get-snp-report && make && popd
          cp -a tools/get-snp-report/bin/* .
          go build ./tools/importkey
          go build ./cmd/skr
        
      - name: Build Windows Executables
        run: |
          go build ./tools/importkey
        env:
          GOOS: windows
          GOARCH: amd64
  
      - name: Upload Executables
        uses: actions/upload-artifact@v3
        with:
          name: binaries
          path: |
            get-snp-report
            verbose-report
            importkey.exe
            importkey
            skr

  create_release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v3
        with:
          name: binaries

      - name: Log in to Azure Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ secrets.AZURE_REGISTRY_URL }}
          username: ${{ secrets.AZURE_REGISTRY_USERNAME }}
          password: ${{ secrets.AZURE_REGISTRY_PASSWORD }}
        
      - name: Publish Secure Key Release Sidecar Image
        uses: docker/build-push-action@v5
        with:
          context: ./
          file: docker/skr/Dockerfile.skr
          push: true
          tags: ${{ secrets.AZURE_REGISTRY_URL }}/public/acc/samples/skr:${{ github.ref_name }}

      - name: Publish Encrypted Filesystem Sidecar Image
        uses: docker/build-push-action@v5
        with:
          context: ./
          file: docker/encfs/Dockerfile.encfs
          push: true
          tags: ${{ secrets.AZURE_REGISTRY_URL }}/public/acc/samples/encfs:${{ github.ref_name }}
          
      - name: Publish release
        uses: softprops/action-gh-release@v2.0.4
        with:
          tag_name: ${{ github.ref_name }}
          prerelease: ${{ contains(github.ref, 'rc') }}
          files: |
            get-snp-report
            verbose-report
            importkey.exe
            importkey
            skr